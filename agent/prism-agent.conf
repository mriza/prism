[server]
host = ''
port = 0
domain = ''
tls_enabled = false
tls_cert = ''
tls_key = ''

[hub]
# WebSocket URL to connect to Hub/Server
url = 'ws://localhost:65432/agent/connect'

# Token configuration:
# Option 1: Leave empty - will read from server's prism-server.conf automatically
# Option 2: Set explicitly - will use this token
token = ''

# Path to server config (for automatic token reading)
# Only used if token is empty
server_config_path = '/opt/prism/server/prism-server.conf'

[database]
path = ''

[[services]]
name = 'mysql'
type = 'systemd'
service_name = 'mysql'
user_scope = false

[[services]]
name = 'caddy'
type = 'systemd'
service_name = 'caddy'
user_scope = false
