[server]
host = "0.0.0.0"
port = 65432
domain = "example.com"
tls_enabled = false # Set to true in production
tls_cert = "/etc/letsencrypt/live/example.com/fullchain.pem"
tls_key = "/etc/letsencrypt/live/example.com/privkey.pem"

[auth]
token = "" # Auto-generated on first run
jwt_secret = "" # Auto-generated on first run

[database]
# SQLite database path
path = "./prism.db"

[valkey]
# Valkey/Redis connection settings (for caching and Pub/Sub only)
addr = "localhost:6379"
password = ""
db = 0
cache_ttl = 300 # 5 minutes default cache TTL
