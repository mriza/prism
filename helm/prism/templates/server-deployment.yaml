apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prism.server.fullname" . }}
  labels:
    {{- include "prism.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "prism.server.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "prism.server.selectorLabels" . | nindent 8 }}
      {{- if .Values.monitoring.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}-server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - "--config"
            - "/opt/prism/config/server.toml"
          env:
            - name: PRISM_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "prism.server.fullname" . }}
                  key: jwt-secret
            - name: PRISM_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "prism.server.fullname" . }}
                  key: agent-token
          volumeMounts:
            - name: data
              mountPath: /opt/prism/data
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          {{- if .Values.server.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "prism.server.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
