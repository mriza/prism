name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: cd frontend && npm ci
    
    - name: Run linter
      run: cd frontend && npm run lint
    
    - name: Run TypeScript check
      run: cd frontend && npx tsc --noEmit
    
    - name: Run tests
      run: cd frontend && npm test -- --run
    
    - name: Build frontend
      run: cd frontend && npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build-${{ matrix.node-version }}
        path: frontend/dist
        retention-days: 7

  test-server:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: cd server && go mod download
    
    - name: Build server
      run: cd server && go build -o /tmp/prism-server ./cmd/server
    
    - name: Run tests
      run: cd server && go test ./... -race -coverprofile=coverage.txt -covermode=atomic
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./server/coverage.txt
        flags: server
        name: codecov-server

  test-agent:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: cd agent && go mod download
    
    - name: Build agent
      run: cd agent && go build -o /tmp/prism-agent ./cmd/agent
    
    - name: Run tests
      run: cd agent && go test ./... -race -coverprofile=coverage.txt -covermode=atomic
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./agent/coverage.txt
        flags: agent
        name: codecov-agent
