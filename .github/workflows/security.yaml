name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday
    - cron: '0 6 * * 1'

jobs:
  go-vuln-check:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck on server
        run: cd server && govulncheck ./...
        continue-on-error: true

      - name: Run govulncheck on agent
        run: cd agent && govulncheck ./...
        continue-on-error: true

  golangci-lint:
    name: Go Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: server
          args: --timeout=5m
        continue-on-error: true

      - name: Run golangci-lint on agent
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: agent
          args: --timeout=5m
        continue-on-error: true

  trivy-scan-server:
    name: Trivy Server Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'server/'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  trivy-scan-agent:
    name: Trivy Agent Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'agent/'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  trivy-scan-frontend:
    name: Trivy Frontend Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'frontend/'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  docker-image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t prism-server:test -f Dockerfile.server .

      - name: Run Trivy on server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'prism-server:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: critical
