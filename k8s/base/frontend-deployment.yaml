apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-frontend
  namespace: prism
  labels:
    app.kubernetes.io/name: prism-frontend
    app.kubernetes.io/part-of: prism
    app.kubernetes.io/version: "v0.5.2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: prism-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prism-frontend
        app.kubernetes.io/part-of: prism
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: prism-frontend
          image: prism-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VITE_API_URL
              value: "http://prism-server:8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: prism-frontend
  namespace: prism
  labels:
    app.kubernetes.io/name: prism-frontend
    app.kubernetes.io/part-of: prism
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: prism-frontend
