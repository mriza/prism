apiVersion: v1
kind: ConfigMap
metadata:
  name: prism-server-config
  namespace: prism
  labels:
    app.kubernetes.io/name: prism-server
    app.kubernetes.io/part-of: prism
data:
  server.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080

    [cors]
    allowed_origins = ["*"]
    allow_credentials = true
    max_age = 86400

    [auth]
    jwt_secret = ""
    token = ""

    [database]
    path = "/opt/prism/data/prism.db"

    [log]
    level = "info"
    format = "json"
