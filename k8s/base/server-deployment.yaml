apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-server
  namespace: prism
  labels:
    app.kubernetes.io/name: prism-server
    app.kubernetes.io/part-of: prism
    app.kubernetes.io/version: "v0.5.2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prism-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prism-server
        app.kubernetes.io/part-of: prism
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: prism-server
          image: prism-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - "--config"
            - "/opt/prism/config/server.toml"
          env:
            - name: PRISM_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: prism-server-secret
                  key: jwt-secret
            - name: PRISM_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: prism-server-secret
                  key: agent-token
          volumeMounts:
            - name: config
              mountPath: /opt/prism/config/server.toml
              subPath: server.toml
              readOnly: true
            - name: data
              mountPath: /opt/prism/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: prism-server-config
        - name: data
          persistentVolumeClaim:
            claimName: prism-server-data
