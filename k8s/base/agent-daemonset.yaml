apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prism-agent
  namespace: prism
  labels:
    app.kubernetes.io/name: prism-agent
    app.kubernetes.io/part-of: prism
    app.kubernetes.io/version: "v0.5.2"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: prism-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prism-agent
        app.kubernetes.io/part-of: prism
    spec:
      hostNetwork: true
      hostPID: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: prism-agent
          image: prism-agent:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/opt/prism/config/agent.toml"
          env:
            - name: PRISM_AGENT_HUB_URL
              value: "ws://prism-server:8080/agent/connect"
            - name: PRISM_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: prism-server-secret
                  key: agent-token
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /opt/prism/config/agent.toml
              subPath: agent.toml
              readOnly: true
            - name: data
              mountPath: /opt/prism/data
            - name: host-run
              mountPath: /run
              readOnly: true
            - name: host-var-run
              mountPath: /var/run
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: prism-agent-config
        - name: data
          hostPath:
            path: /opt/prism-agent-data
            type: DirectoryOrCreate
        - name: host-run
          hostPath:
            path: /run
        - name: host-var-run
          hostPath:
            path: /var/run
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prism-agent-config
  namespace: prism
  labels:
    app.kubernetes.io/name: prism-agent
    app.kubernetes.io/part-of: prism
data:
  agent.toml: |
    [agent]
    hub_url = "ws://prism-server:8080/agent/connect"
    enrollment_key = ""

    [logging]
    level = "info"
    format = "json"
